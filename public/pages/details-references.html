<!-- My References -->
<div style="margin-bottom: 28px;">
  <h2 style="font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">My References</h2>
  <div style="font-size: 13px; color: var(--text-muted);">Add and manage your professional references</div>
</div>

<!-- Add Reference Form -->
<div class="card" style="margin-bottom:24px;">
  <div class="card-header" style="margin-bottom:24px;">
    <h3 style="font-size:14px; margin:0;">Add New Reference</h3>
  </div>
  
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:32px;">
    <!-- Left Column -->
    <div>
      <div class="form-group">
        <label>Salutation</label>
        <select class="form-control" style="width:100px;"><option>Mr.</option><option>Mrs.</option><option>Ms.</option></select>
      </div>
      <div class="form-group">
        <label>First Name*</label>
        <input type="text" class="form-control" placeholder="Enter first name">
      </div>
      <div class="form-group">
        <label>Middle Name</label>
        <input type="text" class="form-control" placeholder="Enter middle name">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" class="form-control" placeholder="Enter last name">
      </div>
      <div class="form-group">
        <label>Address*</label>
        <textarea class="form-control" rows="3" placeholder="Enter full address"></textarea>
      </div>
    </div>

    <!-- Right Column -->
    <div>
      <div class="form-group">
        <label>Phone No</label>
        <input type="text" class="form-control" placeholder="Enter phone number">
      </div>
      <div class="form-group">
        <label>Mobile No*</label>
        <input type="text" class="form-control" placeholder="Enter mobile number">
      </div>
      <div class="form-group">
        <label>Designation</label>
        <input type="text" class="form-control" placeholder="Enter designation">
      </div>
      <div class="form-group">
        <label>E-Mail</label>
        <input type="email" class="form-control" placeholder="Enter email address">
      </div>
    </div>
  </div>

  <div style="display:flex; gap:12px; margin-top:8px;">
    <button class="btn-primary"><i class="ph ph-floppy-disk"></i> Save</button>
    <button class="btn-secondary"><i class="ph ph-arrow-counter-clockwise"></i> Reset</button>
  </div>
</div>

<!-- References List -->
<div class="card" style="margin-bottom:24px;">
  <div class="card-header" style="margin-bottom:16px;">
    <h3 style="font-size:14px; margin:0;">List of References</h3>
    <span class="badge badge-blue">1 Reference</span>
  </div>
  <div class="table-wrapper">
    <table class="table" style="width:100%;">
      <thead>
        <tr>
          <th style="padding:10px 16px;">Name</th>
          <th style="padding:10px 16px;">Address</th>
          <th style="padding:10px 16px;">Designation</th>
          <th style="padding:10px 16px;">Mobile No</th>
          <th style="padding:10px 16px;">Edit</th>
          <th style="padding:10px 16px;">Delete</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="padding:14px 16px; font-weight:600;">Mr Anil Kumar</td>
          <td style="padding:14px 16px;">New Delhi</td>
          <td style="padding:14px 16px;">Sales Manager</td>
          <td style="padding:14px 16px;">9876543231</td>
          <td style="padding:14px 16px;"><i class="ph ph-pencil-simple action-icon" style="cursor:pointer;"></i></td>
          <td style="padding:14px 16px;"><i class="ph ph-trash action-icon" style="cursor:pointer; color:var(--accent-red);"></i></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
