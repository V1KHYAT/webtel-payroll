<div class="page-title">
  <h2>Employee Resignation Approval</h2>
</div>
<div class="card" style="margin-bottom: 24px;">
  <div style=" padding-top: 12px; padding-bottom:12px;">
    <div style="display:grid; grid-template-columns: 140px 1fr; align-items:center; margin-bottom:16px;">
      <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Select status <span style="float:right;">:</span></label>
      <div style="padding-left:12px;"><select class="form-control" style="max-width:200px;"><option>Pending</option><option>Completed</option></select></div>
    </div>
    <div style="display:grid; grid-template-columns: 140px 1fr; align-items:center;">
      <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Approval Level <span style="float:right;">:</span></label>
      <div style="padding-left:12px; display:flex; gap:16px; align-items:center;">
        <label style="font-size:13px; display:flex; align-items:center; gap:6px; cursor:pointer;"><input type="radio" name="appLevel" checked> RM</label>
        <label style="font-size:13px; display:flex; align-items:center; gap:6px; cursor:pointer;"><input type="radio" name="appLevel"> HOD</label>
      </div>
    </div>
  </div>
</div>
