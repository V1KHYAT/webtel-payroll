<!-- VIEW > SEND YOUR SUGGESTIONS -->

<div class="card">
  <h3 style="font-size: 16px; font-weight: 600; color: var(--text-main); margin-bottom: 24px;">
    <i class="fa-solid fa-comment-dots" style="color: var(--primary-color); margin-right: 10px;"></i>Send Your Suggestions
  </h3>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px 40px;">
    <div class="form-group">
      <label>Module Name</label>
      <input type="text" class="form-control" placeholder="Enter the module you want to provide feedback on">
    </div>
    <div style="background: var(--border-light); border-radius: 4px; padding: 16px; font-size: 12px; color: var(--text-muted); line-height: 1.8;">
      <div style="font-weight: 600; color: var(--text-secondary); margin-bottom: 4px;"><i class="fa-solid fa-circle-info" style="color: var(--primary-color); margin-right: 6px;"></i>Guidelines</div>
      <strong>Module Name:</strong> Enter the module or interface name regarding which you want to give suggestions.<br>
      <strong>Suggestions:</strong> Specify your problem or suggestion relating to the module.
    </div>
    <div class="form-group" style="grid-column: span 2;">
      <label>Suggestions or Problem <span style="color:red">*</span></label>
      <textarea class="form-control" style="min-height: 100px;" placeholder="Describe in detail..."></textarea>
    </div>
    <div class="form-group">
      <label>Upload File</label>
      <input type="file" class="form-control" style="padding: 8px;">
    </div>
    <div></div>
    <div class="form-group">
      <label>Rate Software on Design Basis</label>
      <div style="display: flex; gap: 20px; padding: 10px 0;">
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); margin:0;"><input type="radio" name="design" checked> Best</label>
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); margin:0;"><input type="radio" name="design"> Good</label>
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); margin:0;"><input type="radio" name="design"> Avg</label>
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); margin:0;"><input type="radio" name="design"> Poor</label>
      </div>
    </div>
    <div class="form-group">
      <label>Rate Software on Functionality Basis</label>
      <div style="display: flex; gap: 20px; padding: 10px 0;">
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); margin:0;"><input type="radio" name="func" checked> Best</label>
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); margin:0;"><input type="radio" name="func"> Good</label>
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); margin:0;"><input type="radio" name="func"> Avg</label>
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); margin:0;"><input type="radio" name="func"> Poor</label>
      </div>
    </div>
  </div>

  <div style="display: flex; gap: 12px; margin-top: 16px; padding-top: 24px; border-top: 1px solid var(--border-light);">
    <button class="btn-primary"><i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i>Send</button>
    <button class="btn-secondary">Reset</button>
  </div>
</div>
