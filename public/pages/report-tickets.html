<div class="page-title">
  <h2>Search \ Respond \ Export Tickets</h2>
  <div class="page-subtitle">Manage and track helpdesk tickets</div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <div class="card-header">
    <h3 style="font-size:14px; font-weight:600; color:var(--text-main); margin:0;"><i class="ph ph-headset" style="margin-right:8px; color:var(--primary-color);"></i> HelpDesk</h3>
  </div>
  <div style="padding-top:16px;">
    <button class="btn-primary" style="padding:8px 24px;"><i class="ph ph-magnifying-glass" style="margin-right:6px;"></i> SEARCH QUERY</button>
  </div>
</div>

<div class="card" style="margin-bottom: 24px; padding:0; overflow:hidden;">
  <div class="card-header" style="padding: 20px 24px; border-bottom: 1px solid var(--border-light); display:flex; justify-content:space-between; align-items:center;">
    <h3 style="font-size:15px; font-weight:600; color:var(--text-main); margin:0;">List of Tickets</h3>
    <div style="display:flex; align-items:center; gap:8px;">
      <span style="font-size:12px; color:var(--text-muted);">Select number of records per page:</span>
      <select class="form-control" style="padding:4px 8px; width:auto;"><option>50</option><option>100</option></select>
    </div>
  </div>
  
  <div class="table-wrapper" style="border:none;">
    <table class="table" style="width:100%; border-collapse:collapse; font-size:13px; margin:0;">
      <thead style="background:var(--bg-sidebar); border-bottom:1px solid var(--border-light);">
        <tr>
          <th style="padding:12px 16px; text-align:left;"><input type="checkbox"></th>
          <th style="padding:12px 16px; text-align:left; font-weight:600; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Ticket No</th>
          <th style="padding:12px 16px; text-align:left; font-weight:600; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Employee Name</th>
          <th style="padding:12px 16px; text-align:left; font-weight:600; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">AuthorityID</th>
          <th style="padding:12px 16px; text-align:left; font-weight:600; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Category</th>
          <th style="padding:12px 16px; text-align:left; font-weight:600; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Query Category</th>
          <th style="padding:12px 16px; text-align:left; font-weight:600; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Location</th>
          <th style="padding:12px 16px; text-align:left; font-weight:600; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Date</th>
          <th style="padding:12px 16px; text-align:center; font-weight:600; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Status</th>
          <th style="padding:12px 16px; text-align:center; font-weight:600; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Read</th>
          <th style="padding:12px 16px; text-align:center; font-weight:600; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">View</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="11" style="padding:32px; text-align:center; color:var(--text-muted);">
            <i class="ph ph-ticket" style="font-size:32px; color:#cbd5e1; margin-bottom:8px; display:block;"></i>
            0 tickets found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  
  <div style="padding:20px 24px; border-top:1px solid var(--border-light); background:var(--bg-app); display:flex; gap:12px;">
    <button class="btn-primary" style="padding:8px 32px;">SHOW ALL</button>
    <button class="btn-secondary" style="padding:8px 32px;"><i class="ph ph-download-simple" style="margin-right:6px;"></i> EXPORT</button>
  </div>
</div>
