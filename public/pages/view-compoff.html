<!-- VIEW > ASSIGN COMPENSATORY OFF -->

<div class="page-title">
  <h2>Assign Compensatory Off</h2>
  <div class="page-subtitle">Assign comp-off days for employees who worked on holidays or weekends</div>
</div>

<div class="card">
  <h3 class="section-title"><i class="ph ph-clock-counter-clockwise"></i> Compensatory Off Details</h3>

  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; ">
    <div class="form-group" style="margin-bottom:0;">
      <label>Select Employee <span style="color:var(--accent-red)">*</span></label>
      <select class="form-control">
        <option disabled selected>-- Select Employee --</option>
        <option>100048 — Dalip Kumar</option>
        <option>100928 — Jitesh Kumar</option>
        <option>101516 — Vikas Patankar</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label>Comp Off Type</label>
      <select class="form-control">
        <option>Comp Off</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label>Compensatory Off Day <span style="color:var(--accent-red)">*</span></label>
      <input type="date" class="form-control">
    </div>
  </div>

  <div style="display: flex; gap: 12px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-light);">
    <button class="btn-primary"><i class="ph ph-floppy-disk"></i> Save</button>
    <button class="btn-secondary"><i class="ph ph-arrow-counter-clockwise"></i> Reset</button>
  </div>
</div>
