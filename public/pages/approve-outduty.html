<div style="margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end;">
  <div>
    <h2 style="font-size: 24px; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">Approve Outduty And Tour Request</h2>
    <div style="font-size: 14px; color: var(--text-muted);">Manage and respond to employee outduty and tour requisitions</div>
  </div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <div class="card-header">
    <h3 style="font-size:14px; font-weight:600; color:var(--text-main); margin:0;">Custom Search Parameters</h3>
  </div>
  <div style="">
    <div style="display:grid; grid-template-columns: 140px 1fr; align-items:center; margin-bottom:16px;">
      <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">From Date <span style="color:red;">*</span> <span style="float:right;">:</span></label>
      <div style="padding-left:12px;"><input type="date" class="form-control" style="max-width:200px;"></div>
    </div>
    <div style="display:grid; grid-template-columns: 140px 1fr; align-items:center; margin-bottom:16px;">
      <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">To Date <span style="color:red;">*</span> <span style="float:right;">:</span></label>
      <div style="padding-left:12px;"><input type="date" class="form-control" style="max-width:200px;"></div>
    </div>
    <div style="display:grid; grid-template-columns: 140px 1fr; align-items:center; margin-bottom:16px;">
      <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Status <span style="float:right;">:</span></label>
      <div style="padding-left:12px;"><select class="form-control" style="max-width:200px;"><option>Pending from L1</option><option>Approved</option><option>Rejected</option></select></div>
    </div>
    <div style="display:grid; grid-template-columns: 140px 1fr; align-items:center; margin-bottom:24px;">
      <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Generate Report <span style="float:right;">:</span></label>
      <div style="padding-left:12px;"><input type="checkbox" style="width:16px; height:16px;"></div>
    </div>
    <div style="display:flex; gap:12px; margin-left:152px;">
      <button class="btn-primary">SEARCH</button>
      <button class="btn-secondary">RESET</button>
    </div>
  </div>
</div>
