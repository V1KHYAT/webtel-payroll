<div class="page-title">
  <h2>Approve Outduty And Tour Request</h2>
  <div class="page-subtitle">Manage and respond to employee outduty and tour requisitions</div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <div class="card-header">
    <h3 style="font-size:14px; font-weight:600; color:var(--text-main); margin:0;">Custom Search Parameters</h3>
  </div>
  <div style="display:grid; grid-template-columns: 140px 1fr 140px 1fr; gap:16px 24px; align-items:center;">
    <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">From Date <span style="color:var(--accent-red);">*</span></label>
    <div><input type="date" class="form-control" style="max-width:200px;"></div>

    <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">To Date <span style="color:var(--accent-red);">*</span></label>
    <div><input type="date" class="form-control" style="max-width:200px;"></div>

    <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Status</label>
    <div><select class="form-control" style="max-width:200px;"><option>Pending from L1</option><option>Approved</option><option>Rejected</option></select></div>

    <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Generate Report</label>
    <div><input type="checkbox" style="width:16px; height:16px;"></div>
  </div>
  
  <div style="display:flex; gap:12px; margin-top:24px; padding-top:24px; border-top:1px solid var(--border-light);">
    <button class="btn-primary" style="padding:8px 32px;"><i class="ph ph-magnifying-glass" style="margin-right:6px;"></i> SEARCH</button>
    <button class="btn-secondary" style="padding:8px 32px;">RESET</button>
  </div>
</div>
