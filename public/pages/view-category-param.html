<div class="page-title" style="margin-bottom: 24px;">
  <h2>Create Category Parameter</h2>
  <div class="page-subtitle">Manage and view create category parameter</div>
</div>

<!-- VIEW > CREATE CATEGORY PARAMETER -->

<div class="card">
  

  <!-- Tab Bar -->
  <div style="display: flex; border-bottom: 1px solid var(--border-light); margin-bottom: 24px;">
    <button class="tab-btn active" onclick="switchTab('tab-create-params', this)">Create Review Factor Parameters</button>
    <button class="tab-btn" onclick="switchTab('tab-import-params', this)">Import Review Factor Parameters</button>
  </div>

  <!-- TAB 1: Create Review Factor Parameters -->
  <div id="tab-create-params" class="tab-panel" style="display: block;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px 40px; ">
      <div class="form-group">
        <label>Review Factor <span style="color:red">*</span></label>
        <select class="form-control">
          <option disabled selected>-- Select Review Factor --</option>
        </select>
      </div>
      <div class="form-group" style="grid-column: span 2;">
        <label>Select Group <span style="color:red">*</span></label>
        <div style="border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; min-height: 100px; background: var(--border-light);">
          <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary); margin-bottom: 8px;"><input type="checkbox"> Select All</label>
        </div>
      </div>
    </div>
    <div style="display: flex; gap: 12px; margin-top: 16px;">
      <button class="btn-primary"><i class="ph ph-plus" style="margin-right: 8px;"></i>Add Objective / KRA</button>
      <button class="btn-primary" style="background: var(--accent-green);"><i class="ph ph-magnifying-glass" style="margin-right: 8px;"></i>Search</button>
      <button class="btn-secondary">Reset</button>
    </div>
  </div>

  <!-- TAB 2: Import Review Factor Parameters -->
  <div id="tab-import-params" class="tab-panel" style="display: none;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px 40px; ">
      <div class="form-group">
        <label>Review Factor <span style="color:red">*</span></label>
        <select class="form-control">
          <option disabled selected>-- Select Review Factor --</option>
        </select>
      </div>
      <div class="form-group">
        <label>KRA/KPI Use for</label>
        <select class="form-control">
          <option>Employee</option>
          <option>Manager</option>
        </select>
      </div>
      <div class="form-group" style="grid-column: span 2;">
        <label>Select Excel File to Import <span style="color:red">*</span></label>
        <input type="file" class="form-control" style="padding: 8px;" accept=".xls,.xlsx">
      </div>
    </div>
    <div style="display: flex; gap: 12px; margin-top: 16px;">
      <button class="btn-primary"><i class="ph ph-download-simple" style="margin-right: 8px;"></i>Export</button>
      <button class="btn-primary" style="background: var(--accent-green);"><i class="ph ph-file-arrow-up" style="margin-right: 8px;"></i>Import And Save</button>
      <button class="btn-secondary">Reset</button>
    </div>
  </div>
</div>
