<div style="margin-bottom: 24px;">
  <h2 style="font-size: 24px; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">Overtime Approval</h2>
</div>
<div class="card" style="margin-bottom: 24px;">
  <div class="card-header">
    <h3 style="font-size:14px; font-weight:600; color:var(--text-main); margin:0;">Custom Search Parameters</h3>
  </div>
  <div style="max-width: 600px;">
    <div style="display:grid; grid-template-columns: 140px 1fr; align-items:center; margin-bottom:24px;">
      <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Month and Year <span style="float:right;">:</span></label>
      <div style="padding-left:12px; display:flex; gap:8px;">
        <select class="form-control" style="width:100px;"><option>Apr</option><option>May</option><option>Jun</option></select>
        <select class="form-control" style="width:100px;"><option>2026</option></select>
      </div>
    </div>
    <div style="display:flex; gap:12px; margin-left:152px;">
      <button class="btn-primary">SEARCH</button>
      <button class="btn-secondary">RESET</button>
    </div>
  </div>
</div>
