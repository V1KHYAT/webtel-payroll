<div style="margin-bottom: 24px;">
  <h2 style="font-size: 24px; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">Overtime Approval</h2>
</div>
<div class="card" style="margin-bottom: 24px;">
  <div class="card-header" style="background:#2dd4bf; display:flex; justify-content:center; color:#fff; border-radius:4px 4px 0 0; margin:-24px -24px 24px -24px; padding:8px;">
    <h3 style="font-size:12px; font-weight:700; text-transform:uppercase; margin:0; color:#fff; letter-spacing:0.5px;">Custom Search Parameters</h3>
  </div>
  <div style="max-width: 600px;">
    <div style="display:grid; grid-template-columns: 140px 1fr; align-items:center; margin-bottom:24px;">
      <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Month and Year <span style="float:right;">:</span></label>
      <div style="padding-left:12px; display:flex; gap:8px;">
        <select class="form-control" style="width:100px;"><option>Apr</option><option>May</option><option>Jun</option></select>
        <select class="form-control" style="width:100px;"><option>2026</option></select>
      </div>
    </div>
    <div style="display:flex; gap:12px; margin-left:152px;">
      <button class="btn-primary" style="background:#99f6e4; color:#0f766e; font-weight:600; border:none; box-shadow:0 1px 2px rgba(0,0,0,0.05);">SEARCH</button>
      <button class="btn-secondary" style="background:#f3f4f6; color:#4b5563; font-weight:600; border:none; box-shadow:0 1px 2px rgba(0,0,0,0.05);">RESET</button>
    </div>
  </div>
</div>
