<!-- VIEW > ASSIGN SHIFT TO EMPLOYEE'S -->

<div class="card">
  <h3 style="font-size: 16px; font-weight: 600; color: var(--text-main); margin-bottom: 24px;"><i class="fa-solid fa-calendar-days" style="color: var(--primary-color); margin-right: 10px;"></i>Assign Shift To Employee's</h3>

  <!-- Search Parameters -->
  <div style="background: var(--border-light); border-radius: 8px; padding: 16px 20px; margin-bottom: 24px;">
    <div style="font-size: 12px; font-weight: 700; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;">Custom Search Parameters</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; max-width: 700px;">
      <div class="form-group" style="margin-bottom:0;">
        <label>From Date <span style="color:red">*</span></label>
        <input type="date" class="form-control">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>To Date <span style="color:red">*</span></label>
        <input type="date" class="form-control">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>Search Shift Code</label>
        <select class="form-control">
          <option disabled selected>-- Select Shift Code --</option>
          <option>A - General</option>
          <option>B - Morning</option>
          <option>C - Evening</option>
          <option>N - Night</option>
        </select>
      </div>
    </div>
  </div>

  <div style="display: flex; gap: 12px;">
    <button class="btn-primary"><i class="fa-solid fa-magnifying-glass" style="margin-right: 8px;"></i>Search</button>
    <button class="btn-secondary">Reset</button>
  </div>
</div>
