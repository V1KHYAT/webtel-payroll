<!-- Other Income Details -->
<div class="page-title">
  <h2>Other Income Details</h2>
  <div class="page-subtitle">Report additional income sources for tax purposes</div>
</div>

<div class="card" style="margin-bottom:24px;">
  <div class="card-header" style="margin-bottom:24px;">
    <h3 style="font-size:14px; margin:0;">Income Information</h3>
  </div>

  <!-- Auto-filled Employee Info -->
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:24px; padding:16px; background:var(--bg-app); border-radius:8px;">
    <div>
      <div style="font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px;">Code</div>
      <div style="font-size:14px; font-weight:600; color:var(--text-main);">100003</div>
    </div>
    <div>
      <div style="font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px;">Name</div>
      <div style="font-size:14px; font-weight:600; color:var(--text-main);">Surender Singh</div>
    </div>
    <div>
      <div style="font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px;">Department</div>
      <div style="font-size:14px; font-weight:600; color:var(--text-main);">STORE & PURCHASE</div>
    </div>
    <div>
      <div style="font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px;">Designation</div>
      <div style="font-size:14px; font-weight:600; color:var(--text-main);">SENIOR MANAGER</div>
    </div>
  </div>

  <!-- Income Fields -->
  <div style="max-width:500px;">
    <div class="form-group">
      <label>Income Type*</label>
      <select class="form-control">
        <option>-- Select Other Income --</option>
        <option>Rental Income</option>
        <option>Interest Income</option>
        <option>Capital Gains</option>
        <option>Business Income</option>
        <option>Other Sources</option>
      </select>
    </div>
    <div class="form-group">
      <label>Other Income Amount</label>
      <input type="text" class="form-control" placeholder="Enter amount in ₹">
    </div>
  </div>

  <div style="display:flex; gap:12px; margin-top:8px;">
    <button class="btn-primary"><i class="ph ph-floppy-disk"></i> Save</button>
    <button class="btn-secondary"><i class="ph ph-arrow-counter-clockwise"></i> Reset</button>
  </div>
</div>
