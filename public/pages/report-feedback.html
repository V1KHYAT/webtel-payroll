<div class="page-title">
  <h2>Trainer's Feedback Form</h2>
  <div class="page-subtitle">Submit feedback for recent training sessions</div>
</div>

<div class="card" style="margin-bottom: 24px; padding:0; overflow:hidden;">
  <div style="background:var(--primary-color); color:white; padding:8px 16px; font-size:12px; font-weight:600; text-align:center;">
    Custom Search Parameters
  </div>
  <div style="padding:24px;">
    <div style="display:grid; grid-template-columns: 140px 1fr 140px 1fr; gap:16px 24px; align-items:center;">
      
      <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Training Schedule <span style="color:var(--accent-red);">*</span></label>
      <div>
        <select class="form-control" style="max-width:250px;">
          <option>-- Select Training --</option>
        </select>
      </div>

      <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Trainer</label>
      <div>
        <select class="form-control" style="max-width:250px;">
          <option>-- Select Trainer --</option>
        </select>
      </div>

    </div>
    
    <div style="display:flex; gap:12px; margin-top:24px; padding-top:24px; border-top:1px solid var(--border-light);">
      <button class="btn-primary" style="padding:8px 32px;"><i class="ph ph-magnifying-glass" style="margin-right:6px;"></i> SEARCH</button>
      <button class="btn-secondary" style="padding:8px 32px;">RESET</button>
    </div>
  </div>
</div>
