<div class="page-title">
  <h2>Fixation - Objective Setting Form (Employee)</h2>
  <div class="page-subtitle">Set and review your performance objectives</div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <div class="card-header">
    <h3 style="font-size:14px; font-weight:600; color:var(--text-main); margin:0;"><i class="ph ph-target" style="margin-right:8px; color:var(--primary-color);"></i> Objective Parameters</h3>
  </div>
  <div style="display:grid; grid-template-columns: 140px 1fr; gap:16px 24px; align-items:center;">
    
    <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Appraisal Period <span style="color:var(--accent-red);">*</span></label>
    <div>
      <select class="form-control" style="max-width:300px;">
        <option>-- Select Appraisal Period --</option>
        <option>2025-2026 (Mid Year)</option>
        <option>2025-2026 (Annual)</option>
      </select>
    </div>

  </div>
  
  <div style="display:flex; gap:12px; margin-top:24px; padding-top:24px; border-top:1px solid var(--border-light);">
    <button class="btn-primary" style="padding:8px 32px;">SUBMIT</button>
  </div>
</div>
