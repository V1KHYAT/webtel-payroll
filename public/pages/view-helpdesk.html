<div class="page-title" style="margin-bottom: 24px;">
  <h2>Ticket Help Desk</h2>
  <div class="page-subtitle">Manage and view ticket help desk</div>
</div>

<!-- VIEW > TICKET HELP DESK -->

<div class="card" style="margin-bottom: 24px;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    
    <div style="display: flex; gap: 12px;">
      <button class="btn-primary"><i class="ph ph-plus" style="margin-right: 8px;"></i>New Query</button>
      <button class="btn-secondary"><i class="ph ph-magnifying-glass" style="margin-right: 8px;"></i>Search Query</button>
    </div>
  </div>

  <!-- Ticket Table -->
  <div style="font-size: 12px; font-weight: 600; color: var(--primary-color); margin-bottom: 12px;">List of Tickets</div>
  <div class="table-wrapper">
    <table class="table">
      <thead>
        <tr>
          <th style="padding-left:12px;">Ticket No</th>
          <th>Emp Code</th>
          <th>Employee Name</th>
          <th>Cost Center</th>
          <th>Category</th>
          <th>Date</th>
          <th>Status</th>
          <th style="padding-right:12px;">View</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="8" style="text-align: center; padding: 40px 0; color: var(--text-muted);">
            <i class="ph ph-tray" style="font-size: 24px; display: block; margin-bottom: 8px; color: var(--border-color);"></i>
            No tickets found
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
