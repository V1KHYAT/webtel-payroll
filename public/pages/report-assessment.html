<div class="page-title">
  <h2>Employee Assessment Form</h2>
  <div class="page-subtitle">Submit and review employee assessments</div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <div class="card-header">
    <h3 style="font-size:14px; font-weight:600; color:var(--text-main); margin:0;"><i class="ph ph-file-text" style="margin-right:8px; color:var(--primary-color);"></i> Assessment Details</h3>
  </div>
  <div style="display:grid; grid-template-columns: 140px 1fr 140px 1fr; gap:16px 24px; align-items:center;">
    
    <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Select Assessment</label>
    <div style="grid-column: 2 / span 3;">
      <select class="form-control" style="max-width:300px;">
        <option>-- Select Assessment --</option>
      </select>
    </div>

    <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Assessment Date</label>
    <div style="font-size:13px; color:var(--text-main);"></div>

    <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Assessment Status</label>
    <div style="font-size:13px; color:var(--text-main);"></div>

  </div>
</div>
