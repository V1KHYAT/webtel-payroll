<div class="page-title">
  <h2>Task List/Roster</h2>
  <div class="page-subtitle">View and manage your monthly roster</div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <div class="card-header">
    <h3 style="font-size:14px; font-weight:600; color:var(--text-main); margin:0;"><i class="ph ph-calendar-blank" style="margin-right:8px; color:var(--primary-color);"></i> Roster Parameters</h3>
  </div>
  <div style="display:grid; grid-template-columns: 140px 1fr; gap:16px 24px; align-items:center;">
    
    <label style="font-size:13px; font-weight:500; color:var(--text-secondary);">Select Month <span style="color:var(--accent-red);">*</span></label>
    <div>
      <select class="form-control" style="max-width:250px;">
        <option>Apr - 2026</option>
        <option>Mar - 2026</option>
        <option>Feb - 2026</option>
      </select>
    </div>

  </div>
  
  <div style="display:flex; gap:12px; margin-top:24px; padding-top:24px; border-top:1px solid var(--border-light);">
    <button class="btn-primary" style="padding:8px 32px;"><i class="ph ph-eye" style="margin-right:6px;"></i> PREVIEW</button>
    <button class="btn-secondary" style="padding:8px 32px;">RESET</button>
  </div>
</div>
