<div class="page-title" style="margin-bottom: 24px;">
  <h2>Loan And Advance Request</h2>
  <div class="page-subtitle">Manage and view loan and advance request</div>
</div>

<!-- VIEW > LOAN AND ADVANCE REQUEST -->

<div class="card">
  
  <div style="font-size: 12px; color: var(--accent-orange); margin-bottom: 24px;"><i class="ph ph-info" style="margin-right: 4px;"></i>If Loan Amount is >20,000 then Perquisite would be calculated on Loan Amount.</div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px 40px; ">
    <div class="form-group">
      <label>Loan Type <span style="color:red">*</span></label>
      <select class="form-control">
        <option disabled selected>-- Select Loan Type --</option>
        <option>Personal Loan</option>
        <option>Salary Advance</option>
        <option>Emergency Loan</option>
      </select>
    </div>
    <div class="form-group">
      <label>Loan Amount <span style="color:red">*</span></label>
      <div style="display: flex; gap: 12px; align-items: center;">
        <input type="number" class="form-control" placeholder="Enter amount">
        <a href="#" style="font-size: 12px; color: var(--primary-color); font-weight: 600; white-space: nowrap;">Check Eligibility</a>
      </div>
    </div>
    <div class="form-group">
      <label>Duration of Loan (in Months) <span style="color:red">*</span></label>
      <div style="display: flex; gap: 12px; align-items: center;">
        <input type="number" class="form-control" placeholder="No. of months">
        <span style="font-size: 11px; color: var(--accent-orange); white-space: nowrap;">Maximum 30 Installments</span>
      </div>
    </div>
    <div class="form-group">
      <label>Transaction Date <span style="color:red">*</span></label>
      <input type="date" class="form-control">
    </div>
  </div>

  <!-- References -->
  <div style="margin-top: 16px; padding-top: 24px; border-top: 1px solid var(--border-light);">
    <div style="font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 16px;">References</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px;">
      <div class="form-group" style="margin-bottom:0;">
        <label>Reference 1</label>
        <select class="form-control">
          <option disabled selected>-- Select Reference --</option>
          <option>100048 — Dalip Kumar</option>
          <option>100928 — Jitesh Kumar</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="Email address">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>Mobile</label>
        <input type="text" class="form-control" placeholder="Mobile number">
      </div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
      <div class="form-group" style="margin-bottom:0;">
        <label>Reference 2</label>
        <select class="form-control">
          <option disabled selected>-- Select Reference --</option>
          <option>100048 — Dalip Kumar</option>
          <option>100928 — Jitesh Kumar</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="Email address">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>Mobile</label>
        <input type="text" class="form-control" placeholder="Mobile number">
      </div>
    </div>
  </div>

  <div style="display: flex; gap: 12px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-light);">
    <button class="btn-primary"><i class="ph ph-floppy-disk" style="margin-right: 8px;"></i>Save</button>
    <button class="btn-secondary">Reset</button>
  </div>
</div>
