<!-- VIEW > ASSIGN COMPENSATORY OFF -->

<div class="card" style="max-width: 800px;">
  <h3 style="font-size: 16px; font-weight: 600; color: var(--text-main); margin-bottom: 24px;">
    <i class="fa-solid fa-clock-rotate-left" style="color: var(--primary-color); margin-right: 10px;"></i>Assign Compensatory Off
  </h3>

  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;">
    <div class="form-group" style="margin-bottom:0;">
      <label>Select Employee <span style="color:red">*</span></label>
      <select class="form-control">
        <option disabled selected>-- Select Employee --</option>
        <option>100048 — Dalip Kumar</option>
        <option>100928 — Jitesh Kumar</option>
        <option>101516 — Vikas Patankar</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label>Comp Off Type</label>
      <select class="form-control">
        <option>Comp Off</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label>Compensatory Off Day <span style="color:red">*</span></label>
      <input type="date" class="form-control">
    </div>
  </div>

  <div style="display: flex; gap: 12px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-light);">
    <button class="btn-primary"><i class="fa-solid fa-floppy-disk" style="margin-right: 8px;"></i>Save</button>
    <button class="btn-secondary">Reset</button>
  </div>
</div>
